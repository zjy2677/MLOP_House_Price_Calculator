services:
  db:
    image: postgres:16-alpine
    container_name: realestate-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-realestate}
      POSTGRES_USER: ${POSTGRES_USER:-realestate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-realestate_pass}
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: realestate-api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./api:/app/api

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: realestate-frontend
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend

volumes:
  postgres_data:
